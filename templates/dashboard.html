<!DOCTYPE html>

<html>

<head>

<title>Products</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand">

ShopZone

</a>

<div>

<a class="btn btn-outline-light"
href="/cart">

Cart

</a>

</div>

</div>

</nav>

<div class="container mt-5">

<h2 class="mb-4">

Our Products

</h2>

<div class="row">

{% for p in products %}

<div class="col-md-3">

<div class="card shadow mb-4">

<div class="card-body">

<h5>

{{p.name}}

</h5>

<p>

{{p.description}}

</p>

<h4>

₹{{p.price}}

</h4>

<a class="btn btn-primary w-100"
href="/addcart/{{p.id}}">

Add To Cart

</a>

</div>

</div>

</div>

{% endfor %}

</div>

</div>

</body>

</html>
