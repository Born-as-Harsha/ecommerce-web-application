<!DOCTYPE html>

<html>

<head>

<title>Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="card p-4 shadow">

<h2>

My Cart

</h2>

<table class="table">

<tr>

<th>Product</th>

<th>Price</th>

</tr>

{% for p in products %}

<tr>

<td>

{{p.name}}

</td>

<td>

₹{{p.price}}

</td>

</tr>

{% endfor %}

</table>

<h3>

Total ₹{{total}}

</h3>

<a class="btn btn-success"
href="/checkout">

Checkout

</a>

</div>

</div>

</body>

</html>
